<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم التشجيع</title>

    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Tajawal", sans-serif;
            background-color: #fdf6e3;
            margin: 0;
            text-align: center;
        }

        h1 {
            margin: 20px 0;
            color: #6d4c41;
            font-size: 50px;
            font-family: 'Amiri';
        }

        /* 🔥 خلي Bootstrap هو المسؤول عن الترتيب */
        .stickers-container {
            padding: 30px;
        }

        .sticker {
            background: #fff;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
            height: 100%;
        }

        .sticker:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        .sticker img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
        }

        /* 🌙 Lightbox */
        #image-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        #image-modal img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 15px;
        }

        #image-modal #close {
            position: absolute;
            top: 20px;
            right: 25px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        /* 🌙 زر الدارك */
        #darkModeToggle {
            position: fixed;
            top: 15px;
            left: 15px;
            background: #8b6b4c;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 18px;
            cursor: pointer;
            z-index: 999;
        }

        /* 🌙 دارك */
        body.dark {
            background-color: #2f2a25;
        }

        body.dark h1 {
            color: #f5e6d3;
        }

        body.dark .sticker {
            background-color: #3a342e;
        }

        /* 📱 موبايل */
        @media (max-width: 768px) {
            h1 {
                font-size: 30px;
            }

            .sticker img {
                height: 180px;
            }
        }

        /* 📱 صغير */
        @media (max-width: 480px) {
            h1 {
                font-size: 26px;
            }

            .sticker img {
                height: 160px;
            }
        }
    </style>
</head>

<body>

<button id="darkModeToggle">🌙</button>

<h1>قسم التشجيع</h1>

<div class="stickers-container">
    <div class="container">
        <div class="row g-4">

            <!-- ✅ نفس المحتوى بدون حذف -->
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/1.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/2.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/3.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/4.jpg"></div></div>

            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/5.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/6.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/7.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/8.jpg"></div></div>

            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/9.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/10.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/11.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/12.jpg"></div></div>

            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/13.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/14.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/15.jpg"></div></div>
            <div class="col-xl-3 col-lg-4 col-md-6 col-12"><div class="sticker"><img src="image/16.jpg"></div></div>

        </div>
    </div>
</div>

<!-- Lightbox -->
<div id="image-modal">
    <span id="close">&times;</span>
    <img id="modal-img" src="">
</div>

<script>
// Lightbox
const modal = document.getElementById("image-modal");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");

document.querySelectorAll(".sticker img").forEach(img => {
    img.onclick = () => {
        modal.style.display = "flex";
        modalImg.src = img.src;
    };
});

closeBtn.onclick = () => modal.style.display = "none";

modal.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
};

// دارك مود
const toggleBtn = document.getElementById("darkModeToggle");

if (localStorage.getItem("mode") === "dark") {
    document.body.classList.add("dark");
    toggleBtn.textContent = "☀️";
}

toggleBtn.onclick = () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("mode", "dark");
        toggleBtn.textContent = "☀️";
    } else {
        localStorage.setItem("mode", "light");
        toggleBtn.textContent = "🌙";
    }
};
</script>

</body>
</html>
