<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأفرع</title>

    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

    <style>
        ::selection{
           background-color:#ebcab1 ;
        }

        body {
            margin: 0;
            font-family: 'Amiri', serif;
            background-color: #f5e6d3;
            color: #5a4634;
            transition: 0.3s;
            text-align: center;
        }

        h2 {
            margin-top: 40px;
            font-size: 50px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            padding: 50px;
            max-width: 1000px;
            margin: auto;
        }

        .branch button {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #3e2f23;
            background-color: #8b6b4c;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .branch button:hover {
            transform: scale(1.05);
        }

        /* زر الدارك */
        #darkModeToggle {
            position: fixed;
            top: 15px;
            left: 15px;
            background: #8b6b4c;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 999;
            transition: 0.3s;
        }

        #darkModeToggle:hover {
            transform: scale(1.1);
        }

        /* دارك مود */
        body.dark {
            background-color: #2b2b2b;
            color: #eee;
        }

        body.dark h2 {
            color: #f5e6d3;
        }

        body.dark .branch button {
            background-color: #f5e6d3;
            color: #2b2b2b;
            border-color: #f5e6d3;
        }

        /* 📱 موبايل */
        @media (max-width: 768px) {

            h2 {
                font-size: 32px;
                margin-top: 20px;
            }

            .row {
                padding: 20px;
                gap: 20px;
            }

            .branch button {
                padding: 15px;
                font-size: 16px;
            }

            #darkModeToggle {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        /* 📱 موبايل صغير */
        @media (max-width: 480px) {

            h2 {
                font-size: 26px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            .branch button {
                font-size: 15px;
                padding: 14px;
            }
        }

    </style>
</head>

<body>

<button id="darkModeToggle">🌙</button>

<main>
    <section class="Taw-branches">
        <div class="container">

            <h2>أثـَـــــر</h2>

            <div class="row">


                <div class="branch">
                    <button onclick="window.location.href='Summaries.html'">التلاخيص</button>
                </div>

                <div class="branch">
                    <button onclick="window.location.href='ECO.html'">دفعة معنوية</button>
                </div>

                <div class="branch">
                    <button onclick="window.location.href='Contact.html'">تواصل معنا</button>
                </div>

                <div class="branch">
                    <button onclick="window.location.href='Feedback.html'">فيدباك</button>
                </div>

                <div class="branch">
                    <button onclick="window.location.href='YearExam.html'">سنوات سابقة</button>
                </div>

                <div class="branch">
                    <button onclick="window.location.href='Assignment.html'">واجباتي</button>
                </div>

                <div class="branch">
                    <button onclick="window.location.href='https://docs.google.com/forms/d/e/1FAIpQLSc8okKqEHRihZj_EoHhplv_2rJMk-eZMJOYdV_j2YnRNf4mNg/viewform?usp=dialog'">آراء واقتراحات</button>
                </div>

                 <div class="branch">
                    <button onclick="window.location.href='index.html'">الرئيسية</button>
                </div>

            </div>

        </div>
    </section>
</main>

<script>
    const toggleBtn = document.getElementById("darkModeToggle");

    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
        toggleBtn.textContent = "☀️";
    }

    toggleBtn.onclick = () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            localStorage.setItem("mode", "dark");
            toggleBtn.textContent = "☀️";
        } else {
            localStorage.setItem("mode", "light");
            toggleBtn.textContent = "🌙";
        }
    };
</script>

</body>
</html>
